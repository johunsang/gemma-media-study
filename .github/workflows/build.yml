name: Build & Release

# Builds unsigned Windows installers (.msi + NSIS .exe) and publishes them to a
# GitHub Release. No code signing / notarization is performed, so Windows
# SmartScreen will warn on first run (More info -> Run anyway).
#
# Triggers:
#   - push a tag like `v0.2.0`  (the usual path; `npm run release 0.2.0` does this)
#   - run manually from the Actions tab and type a tag (e.g. v0.2.0)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app & publish release (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing secrets are set on purpose: the installers are unsigned.
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Gemma Media Study ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Unsigned Windows installers (`.msi` and NSIS `.exe`).

            These builds are **not code-signed or notarized**, so Windows SmartScreen
            may warn on first launch — choose **More info -> Run anyway**.

            > The app needs [Ollama](https://ollama.com) running with a Gemma 4 model
            > pulled (`ollama pull gemma4:12b`). On first launch, click **First-Time Setup**.
          releaseDraft: false
          prerelease: false
